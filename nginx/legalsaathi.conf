# ============================================================
# LegalSaathi — Nginx Reverse Proxy Configuration
# ============================================================
# Installation on EC2:
#   1. Copy this file:
#      sudo cp nginx/legalsaathi.conf /etc/nginx/sites-available/legalsaathi
#   2. Enable it:
#      sudo ln -sf /etc/nginx/sites-available/legalsaathi /etc/nginx/sites-enabled/legalsaathi
#   3. Remove default:
#      sudo rm -f /etc/nginx/sites-enabled/default
#   4. Test & reload:
#      sudo nginx -t && sudo systemctl reload nginx
#   5. Get SSL certificate:
#      sudo certbot --nginx -d legalsaathi.yourdomain.com
# ============================================================

# ==================== Rate Limiting ====================
# Brute force aur DDoS se bachao
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

# ==================== HTTP → HTTPS Redirect ====================
server {
    listen 80;
    server_name legalsaathi.yourdomain.com;

    # Let's Encrypt certificate verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==================== HTTPS Server ====================
server {
    listen 443 ssl http2;
    server_name legalsaathi.yourdomain.com;

    # ---------- SSL Certificate (Certbot will manage these) ----------
    ssl_certificate /etc/letsencrypt/live/legalsaathi.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/legalsaathi.yourdomain.com/privkey.pem;

    # ---------- SSL Best Practices ----------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ---------- Security Headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---------- Max Upload Size (PDFs) ----------
    client_max_body_size 50M;

    # ---------- Gzip Compression ----------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # ==================== Backend API ====================
    # /api/* → FastAPI backend (port 8000)
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) — chat streaming ke liye CRITICAL
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;  # LLM calls 2-5 sec le sakte hain
        proxy_send_timeout 300s;
    }

    # Health endpoint (no rate limit)
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Local uploaded files (when S3 not configured)
    location /local-files/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ==================== Frontend ====================
    # Everything else → Next.js (port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR (Hot Module Replacement) — development mein useful
        proxy_read_timeout 86400s;
    }

    # ==================== Static Assets Caching ====================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
